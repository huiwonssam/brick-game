<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="내가 만든 벽돌깨기">
    <meta property="og:description" content="심심할 때 한 판! 직접 만든 웹게임입니다."> 
    <title>모바일 벽돌 깨기 게임</title>
    <style>
        body { 
            background: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* 스크롤 방지 */
            touch-action: none; /* 브라우저 기본 터치 동작 방지 */
        }
        canvas { 
            background: #000; 
            border: 4px solid #fff; 
            border-radius: 5px; 
            max-width: 95%; /* 모바일 화면에 맞게 조절 */
            max-height: 80vh;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="480" height="320"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 공 설정
    let x = canvas.width / 2;
    let y = canvas.height - 30;
    let dx = 1; // 속도를 살짝 올렸습니다.
    let dy = -1;
    const ballRadius = 10;

    // 패들 설정
    const paddleHeight = 15; // 모바일에서 보기 편하게 조금 키움
    const paddleWidth = 90; 
    let paddleX = (canvas.width - paddleWidth) / 2;
    let rightPressed = false;
    let leftPressed = false;

    // 벽돌 설정
    const brickRowCount = 3;
    const brickColumnCount = 5;
    const brickWidth = 75;
    const brickHeight = 20;
    const brickPadding = 10;
    const brickOffsetTop = 40;
    const brickOffsetLeft = 35;

    let score = 0;

    const bricks = [];
    for (let c = 0; c < brickColumnCount; c++) {
        bricks[c] = [];
        for (let r = 0; r < brickRowCount; r++) {
            bricks[c][r] = { x: 0, y: 0, status: 1 };
        }
    }

    // --- 이벤트 리스너 ---

    // 1. 키보드 제어 (PC용)
    document.addEventListener("keydown", keyDownHandler, false);
    document.addEventListener("keyup", keyUpHandler, false);

    // 2. 터치 제어 (모바일용)
    canvas.addEventListener("touchstart", handleTouch, false);
    canvas.addEventListener("touchmove", handleTouch, false);

    function keyDownHandler(e) {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
    }

    function keyUpHandler(e) {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
    }

    function handleTouch(e) {
        e.preventDefault(); // 터치 시 화면이 밀리는 현상 방지
        const touch = e.touches[0];
        const rect = canvas.rect//.getBoundingClientRect();
        // 캔버스 내에서의 터치 좌표 계산
        const relativeX = touch.clientX - rect.left;
        // 캔버스의 실제 렌더링 크기와 좌표 크기 비율 계산
        const scaleX = canvas.width / rect.width;
        const finalX = relativeX * scaleX;

        if (finalX > 0 && finalX < canvas.width) {
            paddleX = finalX - paddleWidth / 2;
        }
    }

    function collisionDetection() {
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                let b = bricks[c][r];
                if (b.status === 1) {
                    if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                        dy = -dy;
                        b.status = 0;
                        score++;
                        if (score === brickRowCount * brickColumnCount) {
                            alert("축하합니다! 모든 벽돌을 깼습니다!");
                            document.location.reload();
                        }
                    }
                }
            }
        }
    }

    function drawBall() {
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#FFD700"; // 공 색상을 금색으로 변경
        ctx.fill();
        ctx.closePath();
    }

    function drawPaddle() {
        ctx.beginPath();
        ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
        ctx.fillStyle = "#0095DD";
        ctx.fill();
        ctx.closePath();
    }

    function drawBricks() {
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                if (bricks[c][r].status === 1) {
                    let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                    let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    ctx.beginPath();
                    ctx.rect(brickX, brickY, brickWidth, brickHeight);
                    ctx.fillStyle = "#FF5733";
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function drawScore() {
        ctx.font = "bold 16px Arial";
        ctx.fillStyle = "#fff";
        ctx.fillText("Score: " + score, 15, 25);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawBall();
        drawPaddle();
        drawScore();
        collisionDetection();

        if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
            dx = -dx;
        }
        if (y + dy < ballRadius) {
            dy = -dy;
        } 
        else if (y + dy > canvas.height - ballRadius) {
            if (x > paddleX && x < paddleX + paddleWidth) {
                dy = -dy;
            } else {
                // 게임 오버 전 잠깐 멈춤
                setTimeout(() => {
                    alert("게임 오버!");
                    document.location.reload();
                }, 10);
                return;
            }
        }

        if (rightPressed && paddleX < canvas.width - paddleWidth) {
            paddleX += 7;
        } else if (leftPressed && paddleX > 0) {
            paddleX -= 7;
        }

        x += dx;
        y += dy;
        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
