<!DOCTYPE html> <html> <body style="text-align:center; background:#eee"> <h2>클릭해서 시작!</h2> <canvas id="g" width="480" height="320" style="background:#000"></canvas> <script> const c=document.getElementById("g"), ctx=c.getContext("2d"); let x=240, y=290, dx=2, dy=-2, px=200, started=false, score=0; const bricks=[]; for(let i=0;i<5;i++) { bricks[i]=[]; for(let j=0;j<3;j++) bricks[i][j]={s:1}; } document.addEventListener("mousemove", (e)=> { px=e.clientX - c.offsetLeft - 37; }); c.addEventListener("click", ()=> started=true); function draw() { ctx.clearRect(0,0,480,320); ctx.fillStyle="#09d"; ctx.fillRect(px, 310, 75, 10); for(let i=0;i<5;i++) for(let j=0;j<3;j++) if(bricks[i][j].s) { let bx=i*85+30, by=j*30+30; ctx.fillStyle="#f30"; ctx.fillRect(bx,by,75,20); if(started && x>bx && x<bx+75 && y>by && y<by+20) { dy=-dy; bricks[i][j].s=0; score+=10; } } ctx.fillStyle="#fff"; ctx.fillText("Score: "+score, 10, 20); ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fillStyle="#f80"; ctx.fill(); if(started) { if(x+dx>472 || x+dx<8) dx=-dx; if(y+dy<8) dy=-dy; else if(y+dy>302) { if(x>px && x<px+75) dy=-dy; else location.reload(); } x+=dx; y+=dy; } else { x=px+37; y=302; } requestAnimationFrame(draw); } draw(); </script> </body> </html>
